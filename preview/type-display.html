<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 28px; background: var(--bg); }
  .stack > * + * { margin-top: 12px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0; margin-top: 4px; }
  .label { font-family: var(--font-arabic-display); font-size: 11px; color: var(--fg-accent); letter-spacing: .14em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="label">Display · Reem Kufi 96</div>
      <div class="display" style="font-size:64px; line-height:1.1;">بسم الله</div>
    </div>
  </div>
</body>
</html>
