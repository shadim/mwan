<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--bg); }
  .label { font-family: var(--font-arabic-display); font-size: 10px; color: var(--fg-accent); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;}
  .row { display:flex; gap: 12px; flex-wrap: wrap; align-items:center; }
  .btn { display:inline-flex; align-items:center; gap:8px; font-family: var(--font-arabic-body); font-weight: 700; font-size: 15px; padding: 12px 22px; border-radius: 8px; cursor: pointer; border: 0; transition: all var(--dur-fast) var(--ease-standard); }
  .btn-primary { background: var(--gold-400); color: var(--ink-900); }
  .btn-primary:hover { background: var(--gold-200); }
  .btn-secondary { background: transparent; color: var(--fg-1); box-shadow: inset 0 0 0 1px var(--border-strong); }
  .btn-secondary:hover { box-shadow: inset 0 0 0 1px var(--gold-400); color: var(--gold-400); }
  .btn-ghost { background: transparent; color: var(--fg-accent); padding: 12px 10px; }
  .btn-danger { background: transparent; color: var(--danger); box-shadow: inset 0 0 0 1px #5c2624; }
  .btn-sm { font-size: 13px; padding: 8px 14px; }
</style>
</head>
<body>
  <div class="label">Buttons</div>
  <div class="row">
    <button class="btn btn-primary">تبرّع الآن</button>
    <button class="btn btn-secondary">معرفة المزيد</button>
    <button class="btn btn-ghost">إلغاء</button>
    <button class="btn btn-danger btn-sm">حذف</button>
  </div>
</body>
</html>
