<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>المهاجرين والأنصار — واجهة المعلم</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>html,body{margin:0;padding:0} *{box-sizing:border-box}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="teacher-tabs.jsx"></script>
<script type="text/babel" data-presets="react">

function TeacherApp() {
  const [tab, setTab] = React.useState(0);
  const tabs = [
    { icon: '✓', ar: 'الحضور', en: 'Attendance' },
    { icon: '📖', ar: 'الدروس', en: 'Lessons' },
    { icon: '📝', ar: 'الواجبات', en: 'Homework' },
    { icon: '💬', ar: 'الرسائل', en: 'Messages' },
    { icon: '📅', ar: 'الجدول', en: 'Schedule' },
    { icon: '👤', ar: 'حسابي', en: 'Profile' },
  ];
  return (
    <AppLangProvider>
      <AppShell tabs={tabs} activeTab={tab} onTabChange={setTab}
        role="واجهة المعلم" roleEn="Teacher Portal" user="أ.ف">
        {tab === 0 && <TeacherAttendanceTab/>}
        {tab === 1 && <TeacherLessonsTab/>}
        {tab === 2 && <TeacherHomeworkTab/>}
        {tab === 3 && <TeacherMessagesTab/>}
        {tab === 4 && <TeacherScheduleTab/>}
        {tab === 5 && <TeacherProfileTab/>}
      </AppShell>
    </AppLangProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TeacherApp/>);
</script>
</body>
</html>
