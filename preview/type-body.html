<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg); }
  .stack > * + * { margin-top: 12px; }
  .label { font-family: var(--font-arabic-display); font-size: 10px; color: var(--fg-accent); letter-spacing: .14em; text-transform: uppercase; }
  p { margin: 4px 0 0; }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="label">Body · Tajawal 16/1.8</div>
      <p>نسعى في مدرسة المهاجرين والأنصار إلى بناء جيل يحمل رسالة العلم والأخلاق، يجمع بين الأصالة والمعاصرة.</p>
    </div>
    <div>
      <div class="label">Body-lg · Tajawal 18/1.8</div>
      <p class="body-lg">تعليم يحرّك العقل ويُربّي القلب.</p>
    </div>
    <div>
      <div class="label">Small · Tajawal 14</div>
      <p class="small">لآخر موعد للتسجيل: ١٥ شعبان ١٤٤٧</p>
    </div>
  </div>
</body>
</html>
