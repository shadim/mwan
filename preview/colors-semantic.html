<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { width: 90px; }
  .chip { height: 56px; border-radius: 8px; box-shadow: var(--hairline); }
  .lbl { font-family: var(--font-latin-body); font-size: 11px; color: var(--fg-3); margin-top: 6px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  h3 { font-family: var(--font-arabic-display); color: var(--fg-accent); font-size: 13px; letter-spacing: .12em; text-transform: uppercase; margin: 0 0 10px; font-weight: 500; }
</style>
</head>
<body>
  <h3>Parchment · Semantic</h3>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FBF7EC"></div><div class="lbl">parch-050</div><div class="val">#FBF7EC</div></div>
    <div class="sw"><div class="chip" style="background:#F5F1E6"></div><div class="lbl">parch-100</div><div class="val">#F5F1E6</div></div>
    <div class="sw"><div class="chip" style="background:#EDE6D2"></div><div class="lbl">parch-200</div><div class="val">#EDE6D2</div></div>
    <div class="sw"><div class="chip" style="background:#6B8E4E"></div><div class="lbl">success</div><div class="val">#6B8E4E</div></div>
    <div class="sw"><div class="chip" style="background:#C9944A"></div><div class="lbl">warn</div><div class="val">#C9944A</div></div>
    <div class="sw"><div class="chip" style="background:#B8453A"></div><div class="lbl">danger</div><div class="val">#B8453A</div></div>
    <div class="sw"><div class="chip" style="background:#5B7CA8"></div><div class="lbl">info</div><div class="val">#5B7CA8</div></div>
  </div>
</body>
</html>
