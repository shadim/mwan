<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--bg); }
  .label { font-family: var(--font-arabic-display); font-size: 10px; color: var(--fg-accent); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;}
  .field { margin-bottom: 14px; }
  .flabel { display:block; font-family: var(--font-arabic-body); font-size: 13px; color: var(--fg-2); margin-bottom: 6px; }
  input, select {
    width: 100%; padding: 12px 14px; background: var(--ink-800);
    border: 1px solid var(--border); border-radius: 8px; color: var(--fg-1);
    font-family: var(--font-arabic-body); font-size: 15px; outline: none;
    transition: border-color var(--dur-fast);
  }
  input:focus, select:focus { border-color: var(--gold-400); box-shadow: var(--ring-focus); }
  input::placeholder { color: var(--fg-muted); }
  .hint { font-size: 12px; color: var(--fg-3); margin-top: 4px; }
</style>
</head>
<body>
  <div class="label">Form fields</div>
  <div class="field">
    <label class="flabel">الاسم الكامل للطالب</label>
    <input placeholder="أدخلوا الاسم الثلاثي" />
  </div>
  <div class="field">
    <label class="flabel">تاريخ الميلاد</label>
    <input placeholder="YYYY / MM / DD" />
    <div class="hint">بالتقويم الهجري أو الميلادي</div>
  </div>
</body>
</html>
