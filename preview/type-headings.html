<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg); }
  .stack > * + * { margin-top: 14px; }
  .label { font-family: var(--font-arabic-display); font-size: 10px; color: var(--fg-accent); letter-spacing: .14em; text-transform: uppercase; margin-bottom:2px;}
  h1,h2,h3,h4 { margin:0; }
</style>
</head>
<body>
  <div class="stack">
    <div><div class="label">H1 · Reem Kufi 48/1.15</div><h1>المدرسة المهاجرين والأنصار</h1></div>
    <div><div class="label">H2 · Reem Kufi 30/1.3</div><h2>التسجيل للعام الدراسي</h2></div>
    <div><div class="label">H3 · Tajawal 24/1.3 Bold</div><h3>صفوف البنات — ابتدائي</h3></div>
    <div><div class="label">H4 · Tajawal 20/1.3 Bold</div><h4>المواد الدراسية</h4></div>
  </div>
</body>
</html>
