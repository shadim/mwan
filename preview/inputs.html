<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; background: var(--bg); display: grid; gap: 14px; }
  label { font-family: var(--font-arabic-body); font-size: 13px; color: var(--fg-3); display:block; margin-bottom: 6px; }
  .field {
    width: 100%; padding: 12px 14px; border-radius: 8px;
    background: var(--bg-card); color: var(--fg-1);
    border: 1px solid var(--border);
    font-family: var(--font-arabic-body); font-size: 15px;
    outline: none;
  }
  .field:focus { border-color: var(--gold-400); box-shadow: var(--ring-focus); }
  .field.filled { border-color: var(--border-strong); }
</style>
</head>
<body>
  <div>
    <label>الاسم الكامل</label>
    <input class="field filled" value="محمد بن عبد الله"/>
  </div>
  <div>
    <label>رقم الهوية</label>
    <input class="field" placeholder="٠٠٠ ٠٠٠ ٠٠٠"/>
  </div>
</body>
</html>
