<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { width: 90px; }
  .chip { height: 56px; border-radius: 8px; box-shadow: var(--hairline); }
  .lbl { font-family: var(--font-latin-body); font-size: 11px; color: var(--fg-3); margin-top: 6px; letter-spacing: .02em; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  h3 { font-family: var(--font-arabic-display); color: var(--fg-accent); font-size: 13px; letter-spacing: .12em; text-transform: uppercase; margin: 0 0 10px; font-weight: 500; }
</style>
</head>
<body>
  <h3>Gold accent · single hue</h3>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FBF4DC"></div><div class="lbl">gold-050</div><div class="val">#FBF4DC</div></div>
    <div class="sw"><div class="chip" style="background:#F2DFA1"></div><div class="lbl">gold-200</div><div class="val">#F2DFA1</div></div>
    <div class="sw"><div class="chip" style="background:#E8C76B"></div><div class="lbl">gold-400 ★</div><div class="val">#E8C76B</div></div>
    <div class="sw"><div class="chip" style="background:#C9A24A"></div><div class="lbl">gold-500</div><div class="val">#C9A24A</div></div>
    <div class="sw"><div class="chip" style="background:#8C6D2E"></div><div class="lbl">gold-700</div><div class="val">#8C6D2E</div></div>
    <div class="sw"><div class="chip" style="background:#5A4413"></div><div class="lbl">gold-900</div><div class="val">#5A4413</div></div>
  </div>
</body>
</html>
