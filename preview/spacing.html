<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg); }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .cell { text-align: center; }
  .block { background: var(--gold-400); border-radius: 4px; }
  .s1 { width: 4px; height: 4px; } .s2 { width: 8px; height: 8px; } .s3 { width: 12px; height: 12px; }
  .s4 { width: 16px; height: 16px; } .s5 { width: 20px; height: 20px; } .s6 { width: 24px; height: 24px; }
  .s8 { width: 32px; height: 32px; } .s10 { width: 40px; height: 40px; } .s12 { width: 48px; height: 48px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="block s1"></div><div class="lbl">1 / 4</div></div>
    <div class="cell"><div class="block s2"></div><div class="lbl">2 / 8</div></div>
    <div class="cell"><div class="block s3"></div><div class="lbl">3 / 12</div></div>
    <div class="cell"><div class="block s4"></div><div class="lbl">4 / 16</div></div>
    <div class="cell"><div class="block s5"></div><div class="lbl">5 / 20</div></div>
    <div class="cell"><div class="block s6"></div><div class="lbl">6 / 24</div></div>
    <div class="cell"><div class="block s8"></div><div class="lbl">8 / 32</div></div>
    <div class="cell"><div class="block s10"></div><div class="lbl">10 / 40</div></div>
    <div class="cell"><div class="block s12"></div><div class="lbl">12 / 48</div></div>
  </div>
</body>
</html>
