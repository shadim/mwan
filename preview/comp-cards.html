<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--bg); }
  .label { font-family: var(--font-arabic-display); font-size: 10px; color: var(--fg-accent); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;}
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .card h4 { margin: 0 0 6px; }
  .card p { margin: 0; color: var(--fg-3); font-size: 14px; }
  .card-gold { background: var(--bg-card); box-shadow: var(--hairline-gold); border: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
  <div class="label">Cards · surface &amp; selected</div>
  <div class="grid">
    <div class="card"><h4>صف الابتدائي</h4><p>٢٤ طالب · أ. فاطمة</p></div>
    <div class="card card-gold"><h4>صف الإعدادي</h4><p>١٨ طالب · أ. أحمد</p></div>
  </div>
</body>
</html>
