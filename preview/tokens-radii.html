<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--bg); }
  .label { font-family: var(--font-arabic-display); font-size: 10px; color: var(--fg-accent); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 12px;}
  .row { display:flex; gap: 14px; align-items:center; flex-wrap:wrap; }
  .sample { text-align:center; }
  .box { width: 72px; height: 48px; background: var(--ink-700); box-shadow: var(--hairline); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top:6px; }
</style>
</head>
<body>
  <div class="label">Radii</div>
  <div class="row">
    <div class="sample"><div class="box" style="border-radius:4px"></div><div class="meta">4 · sm</div></div>
    <div class="sample"><div class="box" style="border-radius:8px"></div><div class="meta">8 · md</div></div>
    <div class="sample"><div class="box" style="border-radius:14px"></div><div class="meta">14 · lg</div></div>
    <div class="sample"><div class="box" style="border-radius:20px"></div><div class="meta">20 · xl</div></div>
    <div class="sample"><div class="box" style="border-radius:999px"></div><div class="meta">pill</div></div>
    <div class="sample"><div class="box" style="border-radius:50% 50% 8px 8px / 22% 22% 8px 8px"></div><div class="meta">arch</div></div>
  </div>
</body>
</html>
