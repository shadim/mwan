<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius-pill);
    font-size: 13px; font-family: var(--font-arabic-body);
  }
  .gold { background: rgba(232,199,107,.12); color: var(--gold-400); box-shadow: inset 0 0 0 1px rgba(232,199,107,.3); }
  .ghost { background: var(--ink-700); color: var(--fg-2); }
  .success { background: rgba(107,142,78,.15); color: var(--success); }
  .danger { background: rgba(184,69,58,.15); color: var(--danger); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
</style>
</head>
<body>
  <span class="chip gold"><span class="dot"></span>حملة نشطة</span>
  <span class="chip ghost">قيد المراجعة</span>
  <span class="chip success">حاضر</span>
  <span class="chip danger">غائب</span>
  <span class="chip ghost">الصف الخامس</span>
</body>
</html>
