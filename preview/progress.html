<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg); }
  .wrap { padding: 12px 16px; background: var(--ink-800); border-radius: 12px; box-shadow: var(--hairline); }
  .top { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; }
  .amt { color: var(--fg-1); font-family: var(--font-arabic-display); font-size: 20px; font-weight: 700; }
  .goal { color: var(--fg-3); }
  .bar { margin-top: 10px; height: 8px; background: var(--ink-600); border-radius: 999px; overflow: hidden; }
  .fill { height: 100%; background: linear-gradient(90deg, var(--gold-500), var(--gold-400)); border-radius: 999px; width: 68%; }
  .meta { margin-top: 8px; font-size: 12px; color: var(--fg-3); display:flex; justify-content: space-between; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top"><div class="amt">٦٨٠,٠٠٠ ₪</div><div class="goal">من أصل ١,٠٠٠,٠٠٠ ₪</div></div>
    <div class="bar"><div class="fill"></div></div>
    <div class="meta"><span>٢١٤ متبرعاً</span><span>٦٨٪</span></div>
  </div>
</body>
</html>
