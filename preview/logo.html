<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background: var(--ink-900); display: flex; align-items: center; justify-content: center; height: 100%; min-height: 260px; }
  html, body { height: 100%; }
  .stage { display:grid; grid-template-columns: auto 1fr; gap: 24px; align-items: center; padding: 24px; }
  .mark { width: 120px; height: 120px; }
  .word { font-family: 'Reem Kufi', sans-serif; color: var(--fg-1); font-size: 34px; font-weight: 700; letter-spacing: .02em; direction: rtl; margin: 0; line-height: 1; }
  .sub { font-family: 'Reem Kufi', sans-serif; color: var(--gold-400); font-size: 13px; letter-spacing: .22em; margin-top: 10px; }
</style>
</head>
<body>
  <div class="stage">
    <img class="mark" src="../assets/logo-mark.svg" alt="">
    <div>
      <div class="word">المهاجرين والأنصار</div>
      <div class="sub">MADRASA · EST. 1445H</div>
    </div>
  </div>
</body>
</html>
