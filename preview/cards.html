<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card {
    background: var(--bg-card); border-radius: 14px; padding: 20px;
    box-shadow: var(--hairline); transition: all var(--dur-base) var(--ease-standard);
  }
  .card:hover { background: var(--bg-card-hover); box-shadow: var(--hairline-gold); }
  .eyebrow { font-family: var(--font-arabic-display); font-size: 11px; color: var(--fg-accent); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 8px; }
  h4 { margin: 0 0 6px; font-size: 18px; color: var(--fg-1); font-family: var(--font-arabic-body); font-weight:700; }
  p { margin: 0; color: var(--fg-3); font-size: 13px; line-height: 1.7; }
  .num { font-family: var(--font-arabic-display); font-size: 28px; color: var(--gold-400); font-weight: 700; }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">حملة</div>
    <h4>بناء الفصل الجديد</h4>
    <p>ساهموا في إكمال بناء الفصول للبنات.</p>
  </div>
  <div class="card">
    <div class="eyebrow">طلاب نشطون</div>
    <div class="num">٤٨٢</div>
    <p class="small">عبر ست مراحل دراسية</p>
  </div>
</body>
</html>
