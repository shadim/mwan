<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; background: var(--bg); display:flex; gap:10px; flex-wrap:wrap; }
  .chip {
    font-family: var(--font-arabic-body); font-size: 13px; font-weight: 500;
    padding: 6px 14px; border-radius: 999px;
    background: var(--bg-card); color: var(--fg-2);
    box-shadow: var(--hairline);
  }
  .chip.on { background: var(--gold-400); color: var(--ink-900); box-shadow: none; }
  .chip.success { background: var(--success-bg); color: var(--success); box-shadow: inset 0 0 0 1px rgba(107,142,78,.35); }
  .chip.warn { background: rgba(201,148,74,.15); color: var(--warn); box-shadow: inset 0 0 0 1px rgba(201,148,74,.35); }
  .chip.danger { background: var(--danger-bg); color: var(--danger); box-shadow: inset 0 0 0 1px rgba(184,69,58,.35); }
</style>
</head>
<body>
  <span class="chip">الكل</span>
  <span class="chip on">البنين</span>
  <span class="chip">البنات</span>
  <span class="chip success">حاضر</span>
  <span class="chip warn">متأخر</span>
  <span class="chip danger">غائب</span>
</body>
</html>
