<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Mint Garden — تطبيقات المهاجرين والأنصار</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Tajawal:wght@400;500;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>

<!-- Mint Garden tokens -->
<link rel="stylesheet" href="../colors_and_type.css"/>

<!-- Theme-mint applied at root so the canvas bg + label + grid colors also follow the palette -->
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Tajawal', sans-serif; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Canvas framework -->
<script type="text/babel" src="design-canvas.jsx"></script>
<!-- Shared primitives -->
<script type="text/babel" src="shared.jsx"></script>
<!-- Kit surfaces -->
<script type="text/babel" src="kit-public.jsx"></script>
<script type="text/babel" src="kit-manager.jsx"></script>
<script type="text/babel" src="kit-teacher.jsx"></script>
<script type="text/babel" src="kit-student.jsx"></script>
<script type="text/babel" src="kit-parent.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const W = KIT_W, H = KIT_H;
  return (
    <DesignCanvas>
      <DCSection id="product-surfaces"
        title="Mint Garden — تطبيقات المدرسة"
        subtitle="خمس واجهات باستخدام نفس نظام الألوان الدلالي · class=&quot;theme-mint&quot;">

        <DCArtboard id="public"  label="Public Site · موقع عام"  width={W} height={H}><KitPublic/></DCArtboard>
        <DCArtboard id="manager" label="Manager · لوحة المدير"    width={W} height={H}><KitManager/></DCArtboard>
        <DCArtboard id="teacher" label="Teacher · واجهة المعلم"   width={W} height={H}><KitTeacher/></DCArtboard>
        <DCArtboard id="student" label="Student · واجهة الطالب"   width={W} height={H}><KitStudent/></DCArtboard>
        <DCArtboard id="parent"  label="Parent · واجهة ولي الأمر" width={W} height={H}><KitParent/></DCArtboard>

        <DCPostIt top={-8} right={60} rotate={3} width={220}>
          Every surface uses ONLY semantic tokens: <br/>
          <code>--bg</code>, <code>--fg-1</code>, <code>--accent</code>,<br/>
          <code>--on-accent</code>, <code>--accent-warm</code>.
          <br/><br/>
          Swap themes by changing one class.
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
