<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg); }
  .label { font-family: var(--font-arabic-display); font-size: 10px; color: var(--fg-accent); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 8px; }
  .frame { border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 14px 12px; }
</style>
</head>
<body>
  <div class="label">Qur'an · Amiri 30/2.0 centered</div>
  <div class="frame">
    <div class="quran">﴾ وَقُل رَّبِّ زِدْنِي عِلْمًا ﴿</div>
  </div>
</body>
</html>
