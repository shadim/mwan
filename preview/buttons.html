<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg); display:flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-arabic-body); font-size: 15px; font-weight: 500;
    padding: 12px 22px; border-radius: 8px; cursor: pointer;
    transition: all var(--dur-base) var(--ease-standard); border: none;
  }
  .primary { background: var(--gold-400); color: var(--ink-900); box-shadow: var(--shadow-gold); }
  .primary:hover { background: var(--gold-200); }
  .secondary { background: transparent; color: var(--fg-1); box-shadow: var(--hairline); }
  .secondary:hover { background: var(--bg-card-hover); box-shadow: var(--hairline-gold); }
  .ghost { background: transparent; color: var(--fg-accent); }
  .ghost:hover { color: var(--gold-200); }
  .danger { background: var(--danger); color: white; }
</style>
</head>
<body>
  <button class="btn primary">ساهم الآن</button>
  <button class="btn secondary">التفاصيل</button>
  <button class="btn ghost">إلغاء</button>
  <button class="btn danger">حذف</button>
</body>
</html>
