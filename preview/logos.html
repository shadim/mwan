<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg); display:flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .mark { height: 100px; }
  .word { height: 70px; }
  img { height: 100%; display:block; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 8px; text-align:center; }
</style>
</head>
<body>
  <div><img class="mark" src="../assets/logo-mark.svg"><div class="label">logo-mark.svg</div></div>
  <div><img class="word" src="../assets/logo-horizontal.svg"><div class="label">logo-horizontal.svg</div></div>
</body>
</html>
