<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; background: var(--bg); display:flex; gap: 24px; flex-wrap: wrap; }
  .box { width: 110px; height: 72px; background: var(--ink-700); border-radius: 10px; display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-size:10px; color: var(--fg-3); }
  .sm { box-shadow: var(--shadow-sm); }
  .md { box-shadow: var(--shadow-md); }
  .lg { box-shadow: var(--shadow-lg); }
  .gold { box-shadow: var(--shadow-gold); background: var(--gold-400); color: var(--ink-900); }
  .hl { box-shadow: var(--hairline-gold); }
</style>
</head>
<body>
  <div class="box sm">shadow-sm</div>
  <div class="box md">shadow-md</div>
  <div class="box lg">shadow-lg</div>
  <div class="box gold">shadow-gold</div>
  <div class="box hl">hairline-gold</div>
</body>
</html>
