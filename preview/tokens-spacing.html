<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--bg); }
  .label { font-family: var(--font-arabic-display); font-size: 10px; color: var(--fg-accent); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 12px;}
  .row { display:flex; gap: 10px; align-items:flex-end; }
  .bar { background: var(--gold-400); opacity: .7; height: 28px; border-radius: 3px; }
  .unit { text-align:center; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top:4px; }
</style>
</head>
<body>
  <div class="label">Spacing scale · 8-point grid (4 half-step)</div>
  <div class="row">
    <div class="unit"><div class="bar" style="width:4px"></div><div class="meta">1 · 4</div></div>
    <div class="unit"><div class="bar" style="width:8px"></div><div class="meta">2 · 8</div></div>
    <div class="unit"><div class="bar" style="width:12px"></div><div class="meta">3 · 12</div></div>
    <div class="unit"><div class="bar" style="width:16px"></div><div class="meta">4 · 16</div></div>
    <div class="unit"><div class="bar" style="width:24px"></div><div class="meta">6 · 24</div></div>
    <div class="unit"><div class="bar" style="width:32px"></div><div class="meta">8 · 32</div></div>
    <div class="unit"><div class="bar" style="width:48px"></div><div class="meta">12 · 48</div></div>
    <div class="unit"><div class="bar" style="width:64px"></div><div class="meta">16 · 64</div></div>
    <div class="unit"><div class="bar" style="width:96px"></div><div class="meta">24 · 96</div></div>
  </div>
</body>
</html>
